<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 主背景渐变 -->
    <linearGradient id="mainGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    
    <!-- 播放按钮渐变 -->
    <linearGradient id="playGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff5757;stop-opacity:1" />
    </linearGradient>
    
    <!-- 阴影 -->
    <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- 主背景 -->
  <rect x="32" y="32" width="192" height="192" rx="48" ry="48" fill="url(#mainGradient)" filter="url(#dropshadow)"/>
  
  <!-- 屏幕外框 -->
  <rect x="64" y="72" width="128" height="96" rx="8" ry="8" fill="#2c3e50"/>
  
  <!-- 屏幕内部 -->
  <rect x="72" y="80" width="112" height="80" rx="4" ry="4" fill="#1a1a2e"/>
  
  <!-- 播放按钮 -->
  <circle cx="128" cy="120" r="28" fill="url(#playGradient)"/>
  <polygon points="120,108 120,132 144,120" fill="#ffffff"/>
  
  <!-- 底部文件夹图标 -->
  <g transform="translate(96, 180)">
    <rect x="0" y="8" width="24" height="16" rx="2" ry="2" fill="#f39c12"/>
    <rect x="6" y="4" width="12" height="8" rx="1" ry="1" fill="#e67e22"/>
  </g>
  
  <!-- 播放列表图标 -->
  <g transform="translate(136, 180)">
    <rect x="0" y="4" width="20" height="4" rx="2" ry="2" fill="#4ecdc4"/>
    <rect x="0" y="10" width="16" height="4" rx="2" ry="2" fill="#4ecdc4" opacity="0.7"/>
    <rect x="0" y="16" width="18" height="4" rx="2" ry="2" fill="#4ecdc4" opacity="0.5"/>
  </g>
  
  <!-- 高光效果 -->
  <rect x="32" y="32" width="192" height="96" rx="48" ry="24" fill="url(#highlight)" fill-opacity="0.2"/>
  
  <defs>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
  </defs>
</svg> 